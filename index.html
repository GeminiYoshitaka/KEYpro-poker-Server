<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー管理 - KEYpro poker</title>
<style>
  /* 全体の設定（横揺れ防止・センターずれ修正キープ） */
  *, *::before, *::after { box-sizing: border-box; }

  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  /* 背景はそのまま、コンテナを近未来的なすりガラス風に */
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }
  
  /* eスポーツ中継風のシャープなコンテナ */
  .dashboard-container { display: flex; flex-direction: row; width: 100%; max-width: 1200px; height: 80vh; min-height: 600px; background: rgba(15, 20, 25, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02); overflow: hidden; }
  
  .left-col { flex: 1; padding: 40px; display: flex; flex-direction: column; justify-content: center; align-items: center; border-right: 1px solid rgba(255, 255, 255, 0.05); background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.4) 100%); position: relative; }
  .right-col { flex: 1.5; padding: 40px; display: flex; flex-direction: column; overflow: hidden; background: radial-gradient(circle at top right, rgba(41, 128, 185, 0.1) 0%, rgba(0,0,0,0) 70%); }

  .suits { font-size: 28px; letter-spacing: 12px; margin-bottom: 10px; opacity: 0.9; margin-right: -12px; }
  .suit-red { color: #ff4757; }
  .suit-black { color: #ffffff; }
  
  h1 { color: #ffffff; font-size: 42px; margin: 0 -4px 10px 0; text-shadow: 0 0 20px rgba(255, 255, 255, 0.3); letter-spacing: 4px; font-weight: 900; }
  p.subtitle { font-size: 14px; margin-bottom: 40px; margin-right: -3px; color: #7f8fa6; letter-spacing: 4px; text-transform: uppercase; }
  
  .date-header { font-size: 16px; font-weight: bold; color: #a4b0be; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 8px 25px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); letter-spacing: 3px; margin-right: -3px; }
  
  .timer-label { font-size: 14px; color: #7f8fa6; margin-bottom: 10px; letter-spacing: 4px; text-transform: uppercase; margin-right: -4px; }
  /* タイマーはデジタルサイネージ風に */
  .timer-display { background: rgba(0,0,0,0.6); color: #00d2d3; font-family: 'Courier New', monospace; font-size: 80px; font-weight: bold; padding: 15px 30px; border-radius: 12px; border: 1px solid rgba(0, 210, 211, 0.3); margin-bottom: 40px; text-shadow: 0 0 20px rgba(0, 210, 211, 0.5); box-shadow: inset 0 0 30px rgba(0,0,0,0.8); letter-spacing: 2px; margin-right: -2px; }
  
  .menu-btn.ranking { display: block; width: 90%; max-width: 350px; padding: 18px; background: transparent; color: #ffffff; font-size: 16px; font-weight: bold; text-decoration: none; border: 2px solid rgba(255,255,255,0.2); border-radius: 50px; cursor: pointer; transition: all 0.3s; letter-spacing: 3px; text-transform: uppercase; }
  .menu-btn.ranking:hover { background: #ffffff; color: #000000; box-shadow: 0 0 20px rgba(255, 255, 255, 0.4); }
  
  /* ★ 分かりやすく、かつカッコいいタイトル */
  .board-title { color: #ffffff; font-size: 24px; margin-bottom: 25px; letter-spacing: 3px; font-weight: bold; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: 15px; text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
  .board-title::before { content: ''; display: inline-block; width: 6px; height: 24px; background-color: #00d2d3; box-shadow: 0 0 10px #00d2d3; border-radius: 3px; }
  .board-title span { color: #7f8fa6; font-size: 14px; margin-left: auto; letter-spacing: 1px; font-weight: normal; }
  
  .live-ranking-list { display: flex; flex-direction: column; gap: 12px; width: 100%; height: 100%; overflow-y: auto; padding-right: 15px; }
  .live-ranking-list::-webkit-scrollbar { width: 4px; }
  .live-ranking-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
  .live-ranking-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

  /* ★ eスポーツ/TV中継風のカードデザイン */
  .live-rank-card { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); padding: 15px 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); flex-shrink: 0; transition: all 0.3s; position: relative; overflow: hidden; }
  
  /* 順位ごとのハイライト（VIP感） */
  .live-rank-card.rank-1 { background: linear-gradient(90deg, rgba(241, 196, 15, 0.1) 0%, rgba(255,255,255,0.02) 100%); border: 1px solid rgba(241, 196, 15, 0.3); border-left: 6px solid #f1c40f; }
  .live-rank-card.rank-2 { background: linear-gradient(90deg, rgba(189, 195, 199, 0.1) 0%, rgba(255,255,255,0.02) 100%); border: 1px solid rgba(189, 195, 199, 0.3); border-left: 6px solid #bdc3c7; }
  .live-rank-card.rank-3 { background: linear-gradient(90deg, rgba(205, 127, 50, 0.1) 0%, rgba(255,255,255,0.02) 100%); border: 1px solid rgba(205, 127, 50, 0.3); border-left: 6px solid #cd7f32; }
  .live-rank-card.rank-other { border-left: 6px solid #57606f; }

  /* 順位バッジ */
  .rank-badge { width: 40px; font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; color: #7f8fa6; text-align: center; }
  .rank-1 .rank-badge { color: #f1c40f; text-shadow: 0 0 10px rgba(241, 196, 15, 0.5); }
  .rank-2 .rank-badge { color: #bdc3c7; text-shadow: 0 0 10px rgba(189, 195, 199, 0.5); }
  .rank-3 .rank-badge { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }

  /* 名前表示（スッキリとしたリスト） */
  .name-col { flex-grow: 1; text-align: left; padding-left: 20px; display: flex; flex-direction: column; gap: 4px; }
  .player-name-item { font-size: 20px; font-weight: bold; color: #ffffff; letter-spacing: 2px; }
  .rank-1 .player-name-item { font-size: 24px; color: #f1c40f; }

  /* ★ リエントリー回数をバッジ風に目立たせる */
  .entry-badge { display: flex; align-items: baseline; gap: 6px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 20px; border-radius: 8px; color: #ffffff; }
  .entry-badge .num { font-size: 32px; font-weight: bold; font-family: 'Courier New', monospace; line-height: 1; }
  .entry-badge .unit { font-size: 14px; color: #7f8fa6; font-weight: normal; letter-spacing: 1px; }

  /* トップ3はバッジの色も特別に */
  .rank-1 .entry-badge { background: rgba(241, 196, 15, 0.15); border-color: rgba(241, 196, 15, 0.5); color: #f1c40f; box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
  .rank-1 .entry-badge .unit { color: rgba(241, 196, 15, 0.8); }
  
  .rank-2 .entry-badge { background: rgba(189, 195, 199, 0.15); border-color: rgba(189, 195, 199, 0.5); color: #bdc3c7; }
  .rank-2 .entry-badge .unit { color: rgba(189, 195, 199, 0.8); }

  .rank-3 .entry-badge { background: rgba(205, 127, 50, 0.15); border-color: rgba(205, 127, 50, 0.5); color: #cd7f32; }
  .rank-3 .entry-badge .unit { color: rgba(205, 127, 50, 0.8); }

  /* 誰もリエントリーしていない時の平和な表示 */
  .empty-text { color: #a4b0be; font-size: 16px; width: 100%; text-align: center; margin-top: 60px; letter-spacing: 2px; line-height: 2; }
  .empty-text span { display: inline-block; background: rgba(46, 213, 115, 0.1); border: 1px solid rgba(46, 213, 115, 0.3); color: #2ed573; padding: 5px 15px; border-radius: 20px; font-size: 14px; margin-top: 10px; }
  
  .footer-text { position: absolute; bottom: 15px; right: 20px; font-size: 11px; color: #57606f; letter-spacing: 1px; text-transform: uppercase; }

  .secret-btn { position: fixed; bottom: 15px; left: 15px; background: transparent; color: #57606f; border: none; font-size: 14px; cursor: pointer; padding: 10px; transition: color 0.3s; outline: none; z-index: 100; }
  .secret-btn:hover { color: #ffffff; }

  /* パスワード入力用モーダル */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; display: none; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
  .modal-content { background: #0f1419; padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 90%; max-width: 350px; box-shadow: 0 0 40px rgba(0,0,0,1); }
  .modal-content h3 { color: #ffffff; margin-top: 0; font-size: 18px; margin-bottom: 10px; letter-spacing: 3px; text-transform: uppercase; margin-right: -3px; }
  .modal-content p { font-size: 12px; color: #7f8fa6; margin-bottom: 25px; letter-spacing: 1px; margin-right: -1px; }
  
  #adminPass { width: 140px; padding: 12px; font-size: 36px; text-align: center; letter-spacing: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: #00d2d3; margin-bottom: 30px; outline: none; transition: all 0.3s; font-family: 'Courier New', monospace; padding-left: 24px; }
  #adminPass:focus { border-color: #00d2d3; box-shadow: 0 0 15px rgba(0, 210, 211, 0.3); }
  
  .modal-close-btn { background: transparent; color: #7f8fa6; border: 1px solid #555; padding: 10px 30px; border-radius: 50px; cursor: pointer; font-size: 12px; transition: all 0.3s; letter-spacing: 2px; text-transform: uppercase; margin-right: -2px; }
  .modal-close-btn:hover { background: #ffffff; color: #000; border-color: #ffffff; }

  /* 📱 スマホ用の滑らかスクロール＆センター調整設定 */
  @media screen and (max-width: 900px) {
    body { padding: 10px; display: block; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
    .dashboard-container { flex-direction: column; height: auto; min-height: auto; border-radius: 12px; border-width: 1px; }
    .left-col { border-right: none; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding: 30px 15px; }
    .right-col { padding: 25px 15px; overflow: visible; }
    
    .suits { font-size: 32px; }
    h1 { font-size: 32px; }

    .timer-display { font-size: 56px; padding: 10px 20px; margin-bottom: 30px; }
    .menu-btn.ranking { width: 100%; font-size: 14px; padding: 15px; }
    
    .board-title { font-size: 20px; text-align: center; justify-content: center; margin-right: -4px; }
    .board-title span { display: none; } /* スマホでは英語だけ表示 */
    .live-ranking-list { height: auto; overflow-y: visible; padding-right: 0; }
    
    .live-rank-card { padding: 15px; border-radius: 8px; border-left-width: 4px; }
    .rank-badge { width: 30px; font-size: 22px; }
    
    .name-col { padding-left: 10px; gap: 4px; }
    .player-name-item { font-size: 16px; }
    .rank-1 .player-name-item { font-size: 18px; }
    
    .entry-badge { padding: 6px 12px; }
    .entry-badge .num { font-size: 24px; }
    .entry-badge .unit { font-size: 11px; }
    
    .footer-text { position: static; text-align: center; margin-top: 20px; padding-bottom: 20px; }
  }
</style>
</head>
<body>
  
  <div class="dashboard-container">
    <div class="left-col">
      <div class="suits">
        <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
      </div>
      <h1>KEYpro poker</h1>
      <p class="subtitle">Official Dashboard</p>
      
      <div class="date-header" id="todayDate">----/--/--</div>
      
      <div class="timer-label">SESSION TIME</div>
      <div class="timer-display" id="mainTimer">00:00</div>
      
      <button class="menu-btn ranking" onclick="location.href='ranking.html'">HALL OF FAME</button>
    </div>

    <div class="right-col">
      <div class="board-title">RE-ENTRY RANKING <span>(リエントリー状況)</span></div>
      <div id="topLiveBoard" style="height: 100%;">
        <div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>
      </div>
    </div>
  </div>

  <div class="footer-text">© 2026 KEYpro poker Server</div>

  <button class="secret-btn" onclick="showPasswordModal()">⚙</button>

  <div id="passModal" class="modal-overlay">
    <div class="modal-content">
      <h3>HOST AUTHENTICATION</h3>
      <p>ENTER 4-DIGIT PIN</p>
      <input type="password" id="adminPass" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off">
      <br>
      <button class="modal-close-btn" onclick="closeModal()">CANCEL</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDWO4bFy5lAHALlnKr32b9TTTXNcNQuIqU",
      authDomain: "keypro-poker-server.firebaseapp.com",
      projectId: "keypro-poker-server",
      storageBucket: "keypro-poker-server.firebasestorage.app",
      messagingSenderId: "953048452758",
      appId: "1:953048452758:web:16aa168ae600cc97e67cb7",
      measurementId: "G-3HVG0EP54D"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let currentTimerState = { running: false, elapsedSeconds: 0, lastUpdate: Date.now() };

    onValue(ref(db, 'pokerSession/timer'), (snapshot) => {
      const data = snapshot.val();
      if (data) currentTimerState = data;
    });

    setInterval(() => {
      let currentElapsed = currentTimerState.elapsedSeconds;
      if (currentTimerState.running) {
        const elapsedSinceUpdate = Math.floor((Date.now() - currentTimerState.lastUpdate) / 1000);
        currentElapsed += elapsedSinceUpdate;
      }
      const h = Math.floor(currentElapsed / 3600);
      const m = Math.floor((currentElapsed % 3600) / 60);
      const s = currentElapsed % 60;
      document.getElementById('mainTimer').innerText = 
        (h > 0 ? String(h).padStart(2, '0') + ':' : '') + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }, 1000);

    // ★ リエントリー（ワースト）ランキングの描画処理
    onValue(ref(db, 'pokerSession/players'), (snapshot) => {
      const draftData = snapshot.val() || [];
      const board = document.getElementById('topLiveBoard');
      let activePlayers = [];
      
      draftData.forEach(player => {
        if (player.name && player.name.trim() !== "" && player.entry > 1) { 
          activePlayers.push({ name: player.name, reEntry: player.entry - 1 });
        }
      });

      if (activePlayers.length === 0) {
        board.innerHTML = '<div class="empty-text">現在リエントリー中のプレイヤーはいません<br><span>🕊 ALL PLAYERS SURVIVING</span></div>';
        return;
      }

      let groups = {};
      activePlayers.forEach(p => {
        let key = p.reEntry; 
        if (!groups[key]) {
          groups[key] = { reEntry: p.reEntry, names: [] };
        }
        groups[key].names.push(p.name);
      });

      let groupArray = Object.values(groups);
      groupArray.sort((a, b) => b.reEntry - a.reEntry);

      let html = '<div class="live-ranking-list">';
      groupArray.forEach((group, index) => {
        let rankStr = (index + 1);
        let rankClass = "rank-other";
        
        if (index === 0) { rankClass = "rank-1"; }
        else if (index === 1) { rankClass = "rank-2"; }
        else if (index === 2) { rankClass = "rank-3"; }

        // 名前をリスト形式にするHTML
        let namesHtml = group.names.map(name => `<div class="player-name-item">${name}</div>`).join('');

        html += `
          <div class="live-rank-card ${rankClass}">
            <div class="rank-badge">${rankStr}</div>
            <div class="name-col">
              ${namesHtml}
            </div>
            <div class="entry-badge">
              <span class="num">${group.reEntry}</span><span class="unit">RE</span>
            </div>
          </div>
        `;
      });
      html += '</div>';
      board.innerHTML = html;
    });

    const now = new Date();
    document.getElementById('todayDate').innerText = now.getFullYear() + "/" + String(now.getMonth() + 1).padStart(2, '0') + "/" + String(now.getDate()).padStart(2, '0');

    window.showPasswordModal = function() {
      const modal = document.getElementById('passModal');
      const input = document.getElementById('adminPass');
      modal.style.display = 'flex';
      input.value = '';
      setTimeout(() => input.focus(), 100);
    };

    window.closeModal = function() {
      document.getElementById('passModal').style.display = 'none';
    };

    document.getElementById('adminPass').addEventListener('input', function(e) {
      if (this.value.length === 4) {
        if (this.value === "5424") {
          location.href = 'calc.html';
        } else {
          alert("INCORRECT PIN");
          this.value = '';
        }
      }
    });
  </script>
</body>
</html>
