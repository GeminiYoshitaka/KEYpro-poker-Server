<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポーカー管理 - KEYpro poker</title>
<style>
  body, button, h1, p, div { font-family: 'KEYpro', sans-serif; }
  /* カジノテーブル風の背景グラデーション */
  body { background: radial-gradient(circle at center, #1a5c38 0%, #0a2e1c 100%); color: #ffffff; text-align: center; padding: 40px 20px; margin: 0; min-height: 100vh; }
  .container { max-width: 600px; margin: 0 auto; background-color: rgba(0, 0, 0, 0.4); padding: 40px 30px; border-radius: 12px; border: 2px solid #d4af37; box-shadow: 0 8px 32px rgba(0,0,0,0.6); position: relative; }
  
  /* スートの装飾 */
  .suits { font-size: 24px; letter-spacing: 10px; margin-bottom: 10px; }
  .suit-red { color: #e74c3c; }
  .suit-black { color: #ffffff; }
  
  h1 { color: #d4af37; font-size: 36px; margin: 0 0 10px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); letter-spacing: 2px; }
  p { font-size: 16px; margin-bottom: 40px; color: #ecf0f1; letter-spacing: 1px; }
  
  /* カジノチップ風のボタン */
  .menu-btn { display: block; width: 80%; margin: 0 auto 20px auto; padding: 18px; background: linear-gradient(145deg, #b8860b, #8b6508); color: #ffffff; font-size: 20px; font-weight: bold; text-decoration: none; border: 1px solid #ffd700; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
  .menu-btn:hover { background: linear-gradient(145deg, #d4af37, #b8860b); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6); }
  
  .menu-btn.ranking { background: linear-gradient(145deg, #2c3e50, #1a252f); border: 1px solid #7f8c8d; }
  .menu-btn.ranking:hover { background: linear-gradient(145deg, #34495e, #2c3e50); }
  
  .footer-text { margin-top: 40px; font-size: 12px; color: #7f8c8d; }

  @media screen and (max-width: 600px) {
    body { padding: 20px 10px; }
    .container { padding: 30px 15px; }
    h1 { font-size: 30px; }
    .menu-btn { width: 95%; font-size: 18px; padding: 15px; }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="suits">
      <span class="suit-black">♠</span><span class="suit-red">♥</span><span class="suit-black">♣</span><span class="suit-red">♦</span>
    </div>
    <h1>KEYpro poker</h1>
    <p>チップ精算・ランキング管理</p>
    
    <button class="menu-btn" onclick="location.href='calc.html'">💰 チップ精算</button>
    <button class="menu-btn ranking" onclick="location.href='ranking.html'">👑 ランキング</button>
    
    <div class="footer-text">© 2026 KEYpro poker</div>
  </div>
</body>
</html>
